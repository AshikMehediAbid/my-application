<div class="row">
  <div class="col-3">
    <input type="text" [formField]="empForm.name" placeholder="Enter Name"/>
  </div>
  <div class="col-3">
    <input type="text" [formField]="empForm.email" placeholder="Enter Email"/>
    <div class="text-danger">
      @for(item of empForm.email().errors(); track $index)
      {
        <span>{{item.message}}</span>
      }
    </div>
  </div>
</div>

<div>
    {{empForm().value() | json}}
</div>
