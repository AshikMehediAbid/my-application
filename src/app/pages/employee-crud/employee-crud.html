<div class="container-fluid py-4">
  <div class="row g-4">
    <!-- Employee List -->
    <div class="col-lg-7">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Employee List</h4>
        </div>

        <div class="card-body p-0">
          <table class="table table-hover table-striped align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Status</th>
                <th class="text-center" style="width: 160px">Actions</th>
              </tr>
            </thead>

            <tbody>
              @for (emp of empList; track $index) {
                <tr>
                  <td>{{ emp.id }}</td>
                  <td>{{ emp.name }}</td>
                  <td>{{ emp.department }}</td>
                  <td><span class="badge bg-success">Active</span></td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                      <button class="btn btn-sm btn-warning">Edit</button>
                      <button class="btn btn-sm btn-danger">Delete</button>
                    </div>
                  </td>
                </tr>
              }
            </tbody>
          </table> 
        </div>
      </div>
    </div>

    <!-- Employee Details -->
    <div class="col-lg-5">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Employee Information</h4>
        </div>

        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Employee ID</label>
            <input
              type="number"
              class="form-control"
              [value]="employee.id"
              [(ngModel)]="employee.id"
              name="employeeId"
            />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Employee Name</label>
            <input
              type="text"
              class="form-control"
              [value]="employee.name"
              [(ngModel)]="employee.name"
              name="employeeName"
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Department</label>
            <input
              type="text"
              class="form-control"
              [value]="employee.department"
              [(ngModel)]="employee.department"
              name="employeeDepartment"
            />
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-success" (click)="onSaveEmployee()">Save Employee</button>

            <button class="btn btn-outline-secondary">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
