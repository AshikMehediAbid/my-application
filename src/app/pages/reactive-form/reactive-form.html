<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">Employee Form</div>
    <div class="card-body">
      <form [formGroup] = "empForm" >
        <!-- Name -->
        <div class="mb-3">
          <label for="name" class="form-label">Employee Name</label>
          <input type="text" class="form-control" formControlName = "name" id="name"  placeholder="Enter employee name"/>
          <div class="text-danger">
            @if(empForm.controls['name'].touched || empForm.controls['name'].dirty )
            {
                @if(empForm.controls['name'].errors?.['required'])
                {
                    <span>Name is required</span>
                }
                @else if(empForm.controls['name'].errors?.['minlength'])
                {
                    <span>Name must be at least 4 characters long</span>
                }
            }
          </div>
        </div>

        <!-- Role -->
        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <input type="text" class="form-control" formControlName = "role" id="role"  placeholder="Enter role" />
        </div>

        <!-- Department -->
        <div class="mb-3">
          <label for="dept" class="form-label">Department</label>
          <select class="form-select" formControlName = "department" id="dept" >
            <option selected disabled>Select department</option>
            <option value="HR">HR</option>
            <option value="IT">IT</option>
            <option value="Finance">Finance</option>
            <option value="Sales">Sales</option>
            <option value="Marketing">Marketing</option>
          </select>
        </div>

        <!-- Salary -->
        <div class="mb-3">
          <label for="salary" class="form-label">Salary</label>
          <input type="number" class="form-control" formControlName = "salary" id="salary"  placeholder="Enter salary" />
        </div>


        <!-- Submit Button -->
        <button type="submit" [disabled]="empForm.invalid" class="btn btn-success">Submit</button>
        <button type="reset" class="btn btn-secondary ms-2">Reset</button>
      </form>
    </div>
  </div>
</div>
